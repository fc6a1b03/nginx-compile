name: Build Nginx Based

on:
  workflow_dispatch:
    inputs:
      nginx_version:
        type: string
        required: true
        default: "1.29.6"
        description: "Specify the nginx version"
      openssl_version:
        type: string
        required: true
        default: "openssl-3.6.1"
        description: "Specify the openssl version"
      prefix:
        type: string
        required: true
        default: "/usr/local/nginx"
        description: "Specify the installation prefix"
      enable_geoip2:
        type: choice
        required: true
        default: "false"
        description: 'Enable Geoip2 Download'
        options:
          - "true"
          - "false"

jobs:
  build-nginx:
    runs-on: ubuntu-latest
    env:
      NGINX_SRC_DIR: "/opt/nginx"
      PREFIX: ${{ github.event.inputs.prefix }}
      ENABLE_GEOIP2: ${{ github.event.inputs.enable_geoip2 }}
      NGINX_VERSION: ${{ github.event.inputs.nginx_version }}
      OPENSSL_VERSION: ${{ github.event.inputs.openssl_version }}


    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Pull Docker image and Start container
        run: |
          sudo apt-get -qq -y install docker-ce
          sudo docker pull -q almalinux:9
          sudo docker run -d --name build-nginx-container \
            -v "${{ github.workspace }}:${{ env.NGINX_SRC_DIR }}" \
            almalinux:9 tail -f /dev/null

      - name: Update system and install base dependencies
        run: |
          docker exec build-nginx-container bash -c "
            echo 'deltarpm=True' >> /etc/dnf/dnf.conf
            echo 'keepcache=True' >> /etc/dnf/dnf.conf
            echo 'fastestmirror=True' >> /etc/dnf/dnf.conf
            echo 'max_parallel_downloads=10' >> /etc/dnf/dnf.conf
            dnf clean all
            dnf -y install dnf-plugins-core && dnf config-manager --set-enabled crb
            dnf -y install epel-release && dnf clean all
            dnf makecache && dnf -y update && dnf -y groupinstall 'Development Tools'
          "
          docker exec build-nginx-container bash -c "
            dnf -y install \
                nano wget psmisc go automake gcc gcc-c++ kernel-devel git make cmake tar autoconf zlib \
                zlib-devel openssl openssl-devel bzip2 bzip2-devel pcre perl-core perl-FindBin pcre-devel \
                perl-IPC-Cmd perl-Test-Simple perl-Text-Template libaio libaio-devel brotli-devel glibc-headers \
                glibc-devel libbsd-devel libxcrypt-compat libtool binutils binutils-gold ninja-build libbpf-devel \
                libunwind-devel pkgconf-pkg-config jemalloc jemalloc-devel liburing-devel clang lld
          "

      - name: Install bazel dependencies
        run: |
          docker exec build-nginx-container bash -c "
            curl -L https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64 -o /usr/local/bin/bazel &&
            chmod +x /usr/local/bin/bazel && bazel --version
          "

      - name: Clone OpenSSL repository
        run: |
          docker exec build-nginx-container bash -c "
            cd ${{ env.NGINX_SRC_DIR }} && rm -rf openssl &&
            git clone --depth 1 --branch ${{ env.OPENSSL_VERSION }} --recurse-submodules https://github.com/openssl/openssl.git openssl
          "

      - name: Clone and build dependencies in parallel
        run: |
          docker exec build-nginx-container bash -c "
            cd ${{ env.NGINX_SRC_DIR }}
            # Remove old directories
            rm -rf libmaxminddb zstd pcre2 ngx_brotli ngx_zstd ngx_http_geoip2_module
            # Clone all repositories in parallel
            git clone --depth 1 --recurse-submodules https://github.com/maxmind/libmaxminddb.git libmaxminddb &
            git clone --depth 1 --recurse-submodules https://github.com/facebook/zstd.git zstd &
            git clone --depth 1 --recurse-submodules https://github.com/PCRE2Project/pcre2.git pcre2 &
            git clone --depth 1 --recurse-submodules https://github.com/google/ngx_brotli.git ngx_brotli &
            git clone --depth 1 --recurse-submodules https://github.com/HanadaLee/ngx_http_zstd_module.git ngx_zstd &
            git clone --depth 1 --recurse-submodules https://github.com/leev/ngx_http_geoip2_module.git ngx_http_geoip2_module &
            wait
            echo 'All repositories cloned successfully'
          "

      - name: Build libmaxminddb
        run: |
          docker exec build-nginx-container bash -c "
            cd ${{ env.NGINX_SRC_DIR }}/libmaxminddb && 
            ./bootstrap && ./configure --enable-shared --disable-static --with-pic &&
            make -j\$(nproc) && make install
          "

      - name: Build zstd
        run: |
          docker exec build-nginx-container bash -c "
            cd ${{ env.NGINX_SRC_DIR }}/zstd && 
            make -j\$(nproc) && make install
          "

      - name: Build PCRE2
        run: |
          docker exec build-nginx-container bash -c "
            cd ${{ env.NGINX_SRC_DIR }}/pcre2 && 
            ./autogen.sh && ./configure --enable-jit --enable-pcre2-16 --enable-pcre2-32 --with-pic &&
            make -j\$(nproc) && make install
          "

      - name: Update ngx_brotli submodules
        run: |
          docker exec build-nginx-container bash -c "
            cd ${{ env.NGINX_SRC_DIR }}/ngx_brotli && git submodule update --init
          "

      - name: Sync Geoip2 File
        if: ${{ env.ENABLE_GEOIP2 == 'true' }}
        run: |
          docker exec build-nginx-container bash -c "
            export GEOIP2_DIR='${{ env.NGINX_SRC_DIR }}/geoip'
            export MODULES_DIR='${{ env.NGINX_SRC_DIR }}/modules'
            cd \$GEOIP2_DIR && chmod +x geoip2_sync.sh && ./geoip2_sync.sh || true
            # Create modules directory and move .mmdb files
            mkdir -p \$MODULES_DIR
            find \$GEOIP2_DIR -name '*.mmdb' -type f -exec cp -f {} \$MODULES_DIR/ \; 2>/dev/null || true
            echo 'GeoIP2 database files:'
            ls -la \$MODULES_DIR/*.mmdb 2>/dev/null || echo 'No .mmdb files found'
          "

      - name: Download and extract Nginx source
        run: |
          docker exec build-nginx-container bash -c "
            cd ${{ env.NGINX_SRC_DIR }} && rm -rf nginx-${{ env.NGINX_VERSION }}.tar.gz && rm -rf nginx-${{ env.NGINX_VERSION }} &&
            curl -L -o nginx-${{ env.NGINX_VERSION }}.tar.gz https://nginx.org/download/nginx-${{ env.NGINX_VERSION }}.tar.gz &&
            tar -zxvf nginx-${{ env.NGINX_VERSION }}.tar.gz && rm -rf nginx-${{ env.NGINX_VERSION }}.tar.gz
          "

      - name: Configure Nginx
        run: |
          docker exec build-nginx-container bash -c "
            ldconfig && cd ${{ env.NGINX_SRC_DIR }}/nginx-${{ env.NGINX_VERSION }} &&
            ./configure --prefix=${{ env.PREFIX }} \
                --with-compat \
                --with-threads \
                --with-file-aio \
                --with-http_v2_module \
                --with-http_v3_module \
                --with-http_ssl_module \
                --with-http_sub_module \
                --with-http_slice_module \
                --with-http_realip_module \
                --with-http_gunzip_module \
                --with-http_gzip_static_module \
                --with-http_degradation_module \
                --with-http_stub_status_module \
                --with-http_random_index_module \
                --without-http_autoindex_module \
                --with-stream \
                --with-stream_ssl_module \
                --with-stream_realip_module \
                --with-stream_ssl_preread_module \
                --with-pcre-jit \
                --with-pcre=../pcre2 \
                --add-module=../ngx_zstd \
                --add-module=../ngx_brotli \
                --with-openssl=../openssl \
                --add-dynamic-module=../ngx_http_geoip2_module \
                --with-ld-opt="-ljemalloc -luring -laio -lcrypt -lnuma -Wl,-z,relro,-z,now -flto=thin -fuse-ld=lld -Wl,--as-needed -Wl,--gc-sections -Wl,-O2 -Wl,--no-as-needed -Wl,--strip-all" \
                --with-openssl-opt='-O3 -march=native enable-ec_nistp_64_gcc_128 enable-asm enable-aesni enable-avx2 enable-kyber enable-ktls enable-pqc enable-early-data enable-fips enable-threads enable-devcryptoeng no-tls1 no-tls1_1 no-legacy no-weak-ssl-ciphers -DOPENSSL_USE_NODELETE -DOPENSSL_TLS_SECURITY_LEVEL=3' \
                --with-cc-opt='-O3 -march=native -funroll-loops -fpeel-loops -ftracer -fstack-protector-strong -fomit-frame-pointer -finline-functions -fno-strict-aliasing -ffunction-sections -fdata-sections -pipe -Wl,--gc-sections -pipe -flto -fuse-ld=lld -fmodulo-sched -static-libgcc -static-libstdc++ -D_FORTIFY_SOURCE=3 -DTCP_FASTOPEN=23 -DNGX_QUIC_DISABLE_MIGRATION=0 -DNGX_QUIC_BPF=1 -DNGX_HTTP_CACHE=1 -DNGX_PCRE2=1 -DNGX_HAVE_EVENTFD=1 -DNGX_HAVE_EPOLL=1 -DNGX_HAVE_REUSEPORT=1 -DNGX_HAVE_SO_KEEPALIVE=1 -DNGX_HAVE_TCP_FASTOPEN=1 -DNGX_HAVE_TCP_INFO=1 -DNGX_THREADS=1 -DNGX_HAVE_ATOMIC=1 -DNGX_HAVE_SECURE_RENAME=1 -fvisibility=hidden -fno-semantic-interposition -ftree-vectorize -fstack-clash-protection'
          "

      - name: Build Nginx
        run: |
          docker exec build-nginx-container bash -c "
            ldconfig && cd ${{ env.NGINX_SRC_DIR }}/nginx-${{ env.NGINX_VERSION }} &&
            make -j\$(nproc) &&
            objs/nginx -V &> ${{ env.NGINX_SRC_DIR }}/nginx_build_info.txt &&
            mv objs/nginx ${{ env.NGINX_SRC_DIR }}/ &&
            mkdir -p ${{ env.NGINX_SRC_DIR }}/modules && mv objs/ngx_http_geoip2_module.so ${{ env.NGINX_SRC_DIR }}/modules
          "

      - name: Bundle shared libraries and fix RPATH
        run: |
          docker exec build-nginx-container bash -c '
            ldconfig && rm -rf ${{ env.NGINX_SRC_DIR }}/libs && mkdir -p ${{ env.NGINX_SRC_DIR }}/libs  
            declare -A copied_libs
            ldd ${{ env.NGINX_SRC_DIR }}/nginx | 
              awk "NF >= 3 && \$2 == \"=>\" && \$3 ~ /^\// {print \$3}" |
              while read -r LIB; do
                [ -z "$LIB" ] || [ ! -e "$LIB" ] && continue
                REAL_LIB=$(readlink -f "$LIB")
                [ -z "$REAL_LIB" ] || [ ! -f "$REAL_LIB" ] && continue
                INODE=$(stat -c "%i" "$REAL_LIB")
                if [[ "$REAL_LIB" == /lib64/ld-linux* ]] || \
                   [[ "$REAL_LIB" == */libc.so* ]] || \
                   [[ "$REAL_LIB" == */libm.so* ]] || \
                   [[ "$REAL_LIB" == */libpthread.so* ]] || \
                   [[ "$REAL_LIB" == */libdl.so* ]] || \
                   [[ "$REAL_LIB" == */libgcc_s.so* ]]; then
                  continue
                fi
                if [[ ! -v copied_libs["$INODE"] ]]; then
                  echo "Copying: $(basename "$REAL_LIB")"
                  cp -f "$REAL_LIB" "${{ env.NGINX_SRC_DIR }}/libs/"
                  copied_libs["$INODE"]=1
                fi
              done
          '

      - name: Generate build report
        run: |
          docker exec build-nginx-container bash -c "
            cd ${{ env.NGINX_SRC_DIR }} &&
            echo '============================================' > build_report.txt &&
            echo 'Nginx Build Report' >> build_report.txt &&
            echo '============================================' >> build_report.txt &&
            echo '' >> build_report.txt &&
            echo 'Build Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)' >> build_report.txt &&
            echo 'Nginx Version: ${{ env.NGINX_VERSION }}' >> build_report.txt &&
            echo 'OpenSSL Version: ${{ env.OPENSSL_VERSION }}' >> build_report.txt &&
            echo 'Target Architecture: native' >> build_report.txt &&
            echo '' >> build_report.txt &&
            echo '--- Nginx Configuration ---' >> build_report.txt &&
            cat nginx_build_info.txt >> build_report.txt &&
            echo '' >> build_report.txt &&
            echo '--- Binary Information ---' >> build_report.txt &&
            ls -lh nginx >> build_report.txt &&
            echo '' >> build_report.txt &&
            echo '--- Module Files ---' >> build_report.txt &&
            ls -lh modules/ >> build_report.txt 2>/dev/null || echo 'No modules' >> build_report.
            echo '' >> build_report.txt &&
            echo '--- Libraries Files ---' >> build_report.txt &&
            ls -lh libs/ >> build_report.txt 2>/dev/null || echo 'No Libraries' >> build_report.txt
          "

      - name: Upload Nginx binary and build information
        uses: actions/upload-artifact@v7
        with:
          name: nginx-linux64-${{ env.NGINX_VERSION }}-native
          path: |
            ${{ github.workspace }}/nginx
            ${{ github.workspace }}/libs/**
            ${{ github.workspace }}/modules/**
            ${{ github.workspace }}/nginx_build_info.txt
            ${{ github.workspace }}/build_report.txt
          retention-days: 2
          compression-level: 9
          if-no-files-found: ignore
        continue-on-error: true
