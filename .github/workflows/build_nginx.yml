name: Build Nginx Based

on:
  workflow_dispatch:
    inputs:
      nginx_version:
        type: string
        required: true
        default: "1.29.6"
        description: "Specify the nginx version"
      openssl_version:
        type: string
        required: true
        default: "openssl-3.6.1"
        description: "Specify the openssl version"
      prefix:
        type: string
        required: true
        default: "/usr/local/nginx"
        description: "Specify the installation prefix"
      enable_geoip2:
        type: choice
        required: true
        default: "no"
        description: 'Enable Geoip2 Download'
        options:
          - yes
          - no
      target_arch:
        type: choice
        required: true
        default: "native"
        description: "Target microarchitecture level (ld.so --help 2>&1 | grep -E \"(x86-64-v[2-4]|supported)\")"
        options:
          - x86-64-v2
          - x86-64-v3
          - x86-64-v4
          - native

jobs:
  build-nginx:
    runs-on: ubuntu-latest
    env:
      NGINX_SRC_DIR: "/opt/nginx"
      PREFIX: ${{ github.event.inputs.prefix }}
      TARGET_ARCH: ${{ github.event.inputs.target_arch }}
      ENABLE_GEOIP2: ${{ github.event.inputs.enable_geoip2 }}
      NGINX_VERSION: ${{ github.event.inputs.nginx_version }}
      OPENSSL_VERSION: ${{ github.event.inputs.openssl_version }}
      # geoip2_sync.sh 配置
      VERBOSE: "false"
      NO_FAIL: "true"
      SKIP_EXISTING: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Pull Docker image and Start container
        run: |
          sudo apt-get -qq -y install docker-ce
          sudo docker pull -q almalinux:9
          sudo docker run -d --name build-nginx-container \
            -v "${{ github.workspace }}:${{ env.NGINX_SRC_DIR }}" \
            -e VERBOSE="${{ env.VERBOSE }}" \
            -e NO_FAIL="${{ env.NO_FAIL }}" \
            -e SKIP_EXISTING="${{ env.SKIP_EXISTING }}" \
            almalinux:9 tail -f /dev/null

      - name: Update system and install base dependencies
        run: |
          docker exec build-nginx-container bash -c '
            # DNF 性能优化配置
            printf "%s\n" "deltarpm=True" "keepcache=True" "fastestmirror=True" "max_parallel_downloads=10" >> /etc/dnf/dnf.conf
            dnf clean all
            dnf -y install dnf-plugins-core && dnf config-manager --set-enabled crb
            dnf -y install epel-release && dnf clean all
            dnf makecache && dnf -y update && dnf -y groupinstall "Development Tools"
          '
          # 安装编译依赖（包含新特性所需包）
          docker exec build-nginx-container bash -c '
            dnf -y install \
                nano wget psmisc go automake gcc gcc-c++ kernel-devel git make cmake tar autoconf zlib \
                zlib-devel openssl openssl-devel bzip2 bzip2-devel pcre perl-core perl-FindBin pcre-devel \
                perl-IPC-Cmd perl-Test-Simple perl-Text-Template libaio libaio-devel brotli-devel glibc-headers \
                glibc-devel libbsd-devel libxcrypt-compat libtool binutils binutils-gold ninja-build libbpf-devel \
                libunwind-devel pkgconf-pkg-config jemalloc jemalloc-devel \
                liburing-devel numactl-devel lld llvm
          '

      - name: Install bazelisk
        run: |
          docker exec build-nginx-container bash -c '
            curl -L -o /usr/local/bin/bazel \
              --connect-timeout 10 --retry 2 \
              "https://github.com/bazelbuild/bazelisk/releases/latest/download/bazelisk-linux-amd64" &&
            chmod +x /usr/local/bin/bazel && bazel --version
          '

      # ============================================================================
      # 阶段：并行克隆所有源码（构建速度优化）
      # ============================================================================
      - name: Parallel clone all repositories
        run: |
          docker exec build-nginx-container bash -c '
            cd "${{ env.NGINX_SRC_DIR }}"
            # 清理旧目录
            rm -rf openssl libmaxminddb ngx_brotli zstd ngx_zstd pcre2 ngx_http_geoip2_module
            # 并行克隆所有仓库
            (
              git clone --depth 1 --branch "${{ env.OPENSSL_VERSION }}" \
                https://github.com/openssl/openssl.git openssl &
              git clone --depth 1 --recurse-submodules \
                https://github.com/maxmind/libmaxminddb.git libmaxminddb &
              git clone --depth 1 --recurse-submodules \
                https://github.com/google/ngx_brotli.git ngx_brotli &
              git clone --depth 1 \
                https://github.com/facebook/zstd.git zstd &
              git clone --depth 1 --recurse-submodules \
                https://github.com/HanadaLee/ngx_http_zstd_module.git ngx_zstd &
              git clone --depth 1 --recurse-submodules \
                https://github.com/PCRE2Project/pcre2.git pcre2 &
              git clone --depth 1 --recurse-submodules \
                https://github.com/leev/ngx_http_geoip2_module.git ngx_http_geoip2_module &
              wait
            )
            # 初始化 ngx_brotli 子模块
            cd ngx_brotli && git submodule update --init
          '

      # ============================================================================
      # 阶段：并行构建依赖库（构建速度优化）
      # ============================================================================
      - name: Parallel build dependencies
        run: |
          docker exec build-nginx-container bash -c '
            cd "${{ env.NGINX_SRC_DIR }}"
            # 并行构建三个依赖库
            (
              cd libmaxminddb && ./bootstrap && ./configure && make -j$(nproc) && make install &
              cd zstd && make -j$(nproc) && make install &
              cd pcre2 && ./autogen.sh && ./configure && make -j$(nproc) && make install &
              wait
            )
            # 更新动态链接器缓存
            ldconfig
          '

      # ============================================================================
      # 阶段：同步 GeoIP2 数据库
      # ============================================================================
      - name: Sync GeoIP2 databases
        if: ${{ env.ENABLE_GEOIP2 == 'yes' }}
        run: |
          docker exec build-nginx-container bash -c '
            cd "${{ env.NGINX_SRC_DIR }}/geoip" && 
            chmod +x geoip2_sync.sh &&
            # 执行下载，失败不阻塞流水线（NO_FAIL=true）
            ./geoip2_sync.sh || echo "GeoIP2 download incomplete, continuing..."
            # 移动下载的数据库文件到模块目录
            mkdir -p "${{ env.NGINX_SRC_DIR }}/modules"
            if ls "${{ env.NGINX_SRC_DIR }}/geoip/"*.mmdb 1>/dev/null 2>&1; then
              mv "${{ env.NGINX_SRC_DIR }}/geoip/"*.mmdb "${{ env.NGINX_SRC_DIR }}/modules/"
            fi
          '

      - name: Download Nginx source
        run: |
          docker exec build-nginx-container bash -c '
            cd "${{ env.NGINX_SRC_DIR }}"
            rm -rf "nginx-${{ env.NGINX_VERSION }}" "nginx-${{ env.NGINX_VERSION }}.tar.gz"
            # 使用 HTTP/2 多路复用加速下载
            curl -L -o "nginx-${{ env.NGINX_VERSION }}.tar.gz" \
              --http2 --tcp-fastopen --retry 3 \
              "https://nginx.org/download/nginx-${{ env.NGINX_VERSION }}.tar.gz"
            tar -zxf "nginx-${{ env.NGINX_VERSION }}.tar.gz"
            rm -f "nginx-${{ env.NGINX_VERSION }}.tar.gz"
          '

      # ============================================================================
      # 阶段：验证依赖库
      # ============================================================================
      - name: Verify dependencies
        run: |
          docker exec build-nginx-container bash -c '
            echo "=== Checking installed libraries ==="
            ldconfig
            ldconfig -p | grep -E "(jemalloc|uring|numa)" || true
          
            echo "=== Library files ==="
            ls -la /usr/lib64/libjemalloc* 2>/dev/null || true
            ls -la /usr/lib64/liburing* 2>/dev/null || true
            ls -la /usr/lib64/libnuma* 2>/dev/null || true
          
            echo "=== Linker test ==="
            echo "int main(){}" > /tmp/test.c
            gcc -flto=thin -fuse-ld=lld /tmp/test.c -o /tmp/test -ljemalloc -luring -lnuma 2>&1 || echo "Link test may have warnings"
            rm -f /tmp/test.c /tmp/test
          
            # 导出库路径环境变量
            export LD_LIBRARY_PATH=/usr/lib64:$LD_LIBRARY_PATH
          '

      # ============================================================================
      # 阶段：配置 Nginx
      # ============================================================================
      - name: Configure Nginx
        run: |
          docker exec build-nginx-container bash -c '
            cd "${{ env.NGINX_SRC_DIR }}/nginx-${{ env.NGINX_VERSION }}"
            # 确保库路径正确
            export LD_LIBRARY_PATH=/usr/lib64:$LD_LIBRARY_PATH
            ldconfig
          
            # ================================================================
            # 架构特定优化映射
            # x86-64-v2: 较老服务器支持（CMOV, CX8, FXSR, MMX, SSE, SSE2）
            # x86-64-v3: AVX2 支持（Haswell+，2013年后）
            # x86-64-v4: AVX-512 支持（Skylake-X+，2017年后）
            # native: 使用构建机原生指令集
            # ================================================================
            case "${{ env.TARGET_ARCH }}" in
              x86-64-v2)
                ARCH_FLAGS="-march=x86-64-v2 -mtune=generic"
                ;;
              x86-64-v3)
                ARCH_FLAGS="-march=x86-64-v3 -mtune=haswell"
                ;;
              x86-64-v4)
                ARCH_FLAGS="-march=x86-64-v4 -mtune=sapphirerapids"
                ;;
              native)
                ARCH_FLAGS="-march=native -mtune=native"
                ;;
              *)
                echo "Unknown architecture: ${{ env.TARGET_ARCH }}" >&2
                exit 1
                ;;
            esac
          
            echo "Building with architecture flags: ${ARCH_FLAGS}"
          
            # ================================================================
            # 编译优化参数（新特性 + 高性能 + 低损耗）
            # ================================================================
          
            # C 编译器优化参数
            CC_OPT="-O3 ${ARCH_FLAGS} \
                -funroll-loops -fpeel-loops -ftracer \
                -fstack-protector-strong \
                -fomit-frame-pointer \
                -finline-functions \
                -fno-strict-aliasing \
                -ffunction-sections -fdata-sections \
                -pipe \
                -flto=thin \
                -fuse-ld=lld \
                -static-libgcc -static-libstdc++ \
                -D_FORTIFY_SOURCE=3 \
                -DTCP_FASTOPEN=23 \
                -DNGX_QUIC_DISABLE_MIGRATION=0 \
                -DNGX_QUIC_BPF=1 \
                -DNGX_HTTP_CACHE=1 \
                -DNGX_PCRE2=1 \
                -DNGX_HAVE_EVENTFD=1 \
                -DNGX_HAVE_EPOLL=1 \
                -DNGX_HAVE_REUSEPORT=1 \
                -DNGX_HAVE_SO_KEEPALIVE=1 \
                -DNGX_HAVE_TCP_FASTOPEN=1 \
                -DNGX_HAVE_TCP_INFO=1 \
                -DNGX_THREADS=1 \
                -DNGX_HAVE_ATOMIC=1 \
                -DNGX_HAVE_SECURE_RENAME=1 \
                -fstack-clash-protection \
                -fcf-protection \
                -ftrivial-auto-var-init=zero"
          
            # 链接器优化参数（注意：-flto=thin 已在 CC_OPT 中，此处省略避免重复）
            LD_OPT="-ljemalloc -luring -laio -lcrypt -lnuma \
                -Wl,-z,relro,-z,now \
                -fuse-ld=lld \
                -Wl,--as-needed \
                -Wl,--gc-sections \
                -Wl,-O2"
          
            # OpenSSL 编译优化参数（新特性启用）
            OPENSSL_OPT="-O3 ${ARCH_FLAGS} \
                -funroll-loops -fpeel-loops -ftracer \
                -fomit-frame-pointer -finline-functions \
                -ffunction-sections -fdata-sections \
                -pipe \
                -flto=thin \
                -fuse-ld=lld \
                -static-libgcc -static-libstdc++ \
                -DOPENSSL_USE_NODELETE \
                -DOPENSSL_TLS_SECURITY_LEVEL=3 \
                -D_FORTIFY_SOURCE=3 \
                enable-asm \
                enable-aesni \
                enable-avx2 \
                enable-kyber \
                enable-ktls \
                enable-pqc \
                enable-early-data \
                no-tls1 \
                no-tls1_1 \
                no-legacy \
                no-weak-ssl-ciphers \
                no-tls-deprecated-ec"
          
            # 执行配置（变量直接展开，避免转义问题）
            ./configure --prefix="${{ env.PREFIX }}" \
                --with-compat \
                --with-threads \
                --with-file-aio \
                --with-http_v2_module \
                --with-http_v3_module \
                --with-http_ssl_module \
                --with-http_sub_module \
                --with-http_slice_module \
                --with-http_realip_module \
                --with-http_gunzip_module \
                --with-http_gzip_static_module \
                --with-http_degradation_module \
                --with-http_stub_status_module \
                --with-http_random_index_module \
                --without-http_autoindex_module \
                --with-stream \
                --with-stream_ssl_module \
                --with-stream_realip_module \
                --with-stream_ssl_preread_module \
                --with-pcre-jit \
                --with-pcre=../pcre2 \
                --add-module=../ngx_zstd \
                --add-module=../ngx_brotli \
                --with-openssl=../openssl \
                --add-dynamic-module=../ngx_http_geoip2_module \
                --with-ld-opt="${LD_OPT}" \
                --with-openssl-opt="${OPENSSL_OPT}" \
                --with-cc-opt="${CC_OPT}"
          '

      - name: Build Nginx
        run: |
          docker exec build-nginx-container bash -c '
            cd "${{ env.NGINX_SRC_DIR }}/nginx-${{ env.NGINX_VERSION }}"
            ldconfig
            # 并行编译（使用所有 CPU 核心）
            make -j$(nproc)
            # 保存构建信息
            objs/nginx -V &> "${{ env.NGINX_SRC_DIR }}/nginx_build_info.txt"
            # 移动构建产物
            mv objs/nginx "${{ env.NGINX_SRC_DIR }}/"
            mkdir -p "${{ env.NGINX_SRC_DIR }}/modules"
            mv objs/ngx_http_geoip2_module.so "${{ env.NGINX_SRC_DIR }}/modules/"
          '

      - name: Bundle shared libraries
        run: |
          docker exec build-nginx-container bash -c '
            ldconfig
            rm -rf "${{ env.NGINX_SRC_DIR }}/libs"
            mkdir -p "${{ env.NGINX_SRC_DIR }}/libs"
            # 使用关联数组去重（基于 inode）
            declare -A copied_libs
            ldd "${{ env.NGINX_SRC_DIR }}/nginx" | 
              awk "NF >= 3 && \$2 == \"=>\" && \$3 ~ /^\// {print \$3}" |
              while read -r LIB; do
                [[ -z "$LIB" || ! -e "$LIB" ]] && continue
                REAL_LIB=$(readlink -f "$LIB")
                [[ -z "$REAL_LIB" || ! -f "$REAL_LIB" ]] && continue
                INODE=$(stat -c "%i" "$REAL_LIB")
                # 排除核心系统库
                [[ "$REAL_LIB" == /lib64/ld-linux* ]] && continue
                [[ "$REAL_LIB" == */libc.so* ]] && continue
                [[ "$REAL_LIB" == */libm.so* ]] && continue
                [[ "$REAL_LIB" == */libpthread.so* ]] && continue
                [[ "$REAL_LIB" == */libdl.so* ]] && continue
                [[ "$REAL_LIB" == */libgcc_s.so* ]] && continue
                # 避免重复复制
                if [[ ! -v copied_libs["$INODE"] ]]; then
                  echo "Copying: $(basename "$REAL_LIB")"
                  cp -f "$REAL_LIB" "${{ env.NGINX_SRC_DIR }}/libs/"
                  copied_libs["$INODE"]=1
                fi
              done
          '

      - name: Validate and report
        run: |
          docker exec build-nginx-container bash -c '
            cd "${{ env.NGINX_SRC_DIR }}"
            echo "========================================"
            echo "Architecture: ${{ env.TARGET_ARCH }}"
            echo "========================================"
            # ELF 信息
            if command -v readelf >/dev/null; then
              echo "--- ELF Header ---"
              readelf -h ./nginx | grep -E "Machine|Class|OS/ABI"
            fi
            # 指令集检测
            if command -v objdump >/dev/null; then
              echo "--- Instruction Set Check ---"
              # AVX2 检测
              if objdump -d ./nginx | grep -q "ymm"; then
                echo "✓ AVX2 (256-bit) instructions detected"
              else
                echo "✗ No AVX2 instructions"
              fi
              # AVX-512 检测
              if objdump -d ./nginx | grep -q "zmm"; then
                echo "✓ AVX-512 (512-bit) instructions detected"
              else
                echo "✗ No AVX-512 instructions"
              fi
            fi
            # 文件大小
            echo "--- Binary Size ---"
            du -h ./nginx
          '

      # 生成构建报告
      - name: Generate build report
        run: |
          REPORT_FILE="${{ github.workspace }}/build_report.txt"
          echo "========================================" > "$REPORT_FILE"
          echo "Nginx Build Report" >> "$REPORT_FILE"
          echo "========================================" >> "$REPORT_FILE"
          echo "Version:     ${{ env.NGINX_VERSION }}" >> "$REPORT_FILE"
          echo "OpenSSL:     ${{ env.OPENSSL_VERSION }}" >> "$REPORT_FILE"
          echo "Target Arch: ${{ env.TARGET_ARCH }}" >> "$REPORT_FILE"
          echo "Build Date:  $(date -Iseconds)" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          echo "Build Info:" >> "$REPORT_FILE"
          cat "${{ github.workspace }}/nginx_build_info.txt" 2>/dev/null >> "$REPORT_FILE" || echo "N/A" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          echo "Libraries:" >> "$REPORT_FILE"
          ls -la "${{ github.workspace }}/libs/" 2>/dev/null >> "$REPORT_FILE" || echo "No external libraries" >> "$REPORT_FILE"
          echo "" >> "$REPORT_FILE"
          echo "Modules:" >> "$REPORT_FILE"
          ls -la "${{ github.workspace }}/modules/" 2>/dev/null >> "$REPORT_FILE" || echo "No modules" >> "$REPORT_FILE"
          echo "========================================" >> "$REPORT_FILE"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: nginx-linux64-${{ env.NGINX_VERSION }}-${{ env.TARGET_ARCH }}
          path: |
            ${{ github.workspace }}/nginx
            ${{ github.workspace }}/libs/**
            ${{ github.workspace }}/modules/**
            ${{ github.workspace }}/build_report.txt
            ${{ github.workspace }}/nginx_build_info.txt
          retention-days: 2
          compression-level: 9
          if-no-files-found: error
